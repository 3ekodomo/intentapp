<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GitHub Image Uploader</title>
    <link rel="manifest" href="manifest.json">
    <style>
        body { font-family: monospace; background: #121212; color: #fff; padding: 20px; }
        input, button { padding: 10px; margin: 5px 0; width: 100%; box-sizing: border-box; background: #222; color: #fff; border: 1px solid #444; }
        button { background: #2ea44f; cursor: pointer; border: none; font-weight: bold; }
        .result-item { border: 1px solid #444; padding: 10px; margin-top: 15px; display: flex; flex-direction: column; gap: 10px; background: #1e1e1e;}
        .result-item img { max-width: 200px; max-height: 200px; object-fit: contain; border: 1px solid #555; }
        textarea { width: 100%; background: #000; color: #0f0; border: none; padding: 5px; resize: none; }
    </style>
</head>
<body>

    <h2>Config</h2>
    <input type="password" id="ghToken" placeholder="GitHub Personal Access Token (repo scope)">
    <input type="text" id="ghRepo" placeholder="owner/repo (e.g., octocat/Hello-World)">
    <input type="text" id="ghFolder" placeholder="Folder path (e.g., images/) - Optional">

    <h2>Upload</h2>
    <input type="file" id="fileInput" multiple accept="image/*">
    <button id="uploadBtn">Upload to GitHub</button>

    <h2>Results</h2>
    <div id="results"></div>

    <script src="app.js"></script>
</body>
</html>
